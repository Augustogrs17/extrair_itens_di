name: Build EXE (Windows)

# EN: Builds a standalone Windows .exe from dni_ferramentas.py
# (unified app: "Projetos Preliminares" + "Extrair Itens DI" +
# "Cruzar PPAP" tabs) using PyInstaller on a windows-latest GitHub-hosted
# runner, then uploads it as a downloadable artifact.

on:
  workflow_dispatch:    # permite rodar manualmente pelo botao "Run workflow"
  push:
    paths:
      - 'dni_ferramentas.py'
      - '.github/workflows/build-exe.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pyinstaller ttkbootstrap

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name DNIFerramentas --version-file version_info.txt --icon icon_dni.ico dni_ferramentas.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNIFerramentas-exe
          path: dist/DNIFerramentas.exe
