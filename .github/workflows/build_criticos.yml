name: Build Cockpit Críticos

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install pyinstaller openpyxl pandas

      - name: Gerar executável
        run: |
          pyinstaller --onefile --windowed --name "Cockpit_Criticos" cockpit_criticos.py

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Cockpit_Criticos_exe
          path: dist/Cockpit_Criticos.exe
          retention-days: 30
